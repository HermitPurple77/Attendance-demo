<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Device Status Monitoring</title>
  <!-- React + Babel via CDN — no npm needed! -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: Arial, Helvetica, sans-serif; background: #e5e7eb; overflow: hidden; }

    header {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 140px;
      background: #353b8b; color: #fff;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 24px; z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 14px; width: 20%; }
    .logo-image { border-radius: 50%; width: 90px; height: 90px; border: 3px solid #6c94be; background: #6c94be; object-fit: cover; }
    .org-name h3 { font-size: 15px; margin-bottom: 4px; }
    .org-name span { font-size: 13px; opacity: 0.85; }
    .header-mid { width: 60%; text-align: center; }
    .header-mid h1 { font-size: 1.5rem; letter-spacing: 1px; margin-bottom: 10px; }
    .nav-btns { display: flex; justify-content: center; gap: 8px; }
    .nav-btns button { padding: 8px 20px; background: #5078a0; border: 1px solid #1664b3; border-radius: 4px; color: #fff; cursor: pointer; font-size: 0.9rem; transition: background 0.2s; }
    .nav-btns button:hover { background: #0052a3; }
    .header-right { width: 20%; display: flex; justify-content: flex-end; }
    .logout-btn { padding: 10px 20px; background: #c0392b; border: none; border-radius: 5px; color: #fff; font-weight: 600; cursor: pointer; font-size: 1rem; transition: transform 0.2s; }
    .logout-btn:hover { transform: scale(1.05); }

    .sidebar {
      position: fixed; top: 140px; left: 0;
      width: 200px; height: calc(100vh - 200px);
      background: #cad3ec; z-index: 9;
      padding-top: 10px; text-align: center;
    }
    .sidebar h6 { font-size: 0.8rem; color: #333; text-transform: uppercase; letter-spacing: 1px; margin: 10px 0; }
    .dropdown-label { display: block; background: #34495e; padding: 10px 12px; cursor: pointer; font-weight: bold; color: #fff; font-size: 1rem; user-select: none; }
    .dropdown-label:hover { background: #1e293b; }
    .dropdown-items { background: #3c5a9c; overflow: hidden; transition: max-height 0.25s ease-in; }
    .dropdown-item { display: block; color: #fff; padding: 10px 15px; cursor: pointer; font-size: 0.9rem; }
    .dropdown-item:hover { background: #3f588a; }

    #content {
      position: fixed; top: 140px; left: 200px;
      right: 0; bottom: 60px;
      padding: 30px; background: #fff; overflow-y: auto;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .container h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 1.6rem; }

    .legend { display: flex; justify-content: center; gap: 20px; margin: 10px 0 20px; }
    .legend span { display: flex; align-items: center; gap: 6px; font-size: 0.9rem; color: #444; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }

    .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 0.85rem; color: #888; }

    .ip-item {
      display: flex; align-items: center;
      padding: 14px 16px; border: 1px solid #ddd;
      border-radius: 6px; margin-bottom: 10px;
      background: #f9f9f9; flex-wrap: wrap; gap: 8px;
      transition: box-shadow 0.2s;
    }
    .ip-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .addr { font-weight: 500; min-width: 140px; color: #222; }
    .status-text { font-weight: bold; min-width: 65px; }
    .response-time { color: #555; font-size: 0.9em; }
    .last-checked { color: #999; font-size: 0.82em; margin-left: auto; }

    .loading { text-align: center; color: #888; padding: 2rem; font-style: italic; }
    .error-msg { text-align: center; color: #c0392b; padding: 1rem; background: #fdecea; border-radius: 6px; margin-top: 1rem; }

    footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 60px; background: #194485; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; z-index: 10;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">

    const API_URL = 'http://localhost:8080/api/ips';

    // ── Helper functions ──────────────────────────
    function getColor(status) {
      switch(status) {
        case 'UP':    return 'green';
        case 'DOWN':  return 'red';
        case 'ERROR': return 'orange';
        default:      return 'gray';
      }
    }

    function getText(status) {
      switch(status) {
        case 'UP':    return 'Online';
        case 'DOWN':  return 'Offline';
        case 'ERROR': return 'Error';
        default:      return 'Unknown';
      }
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // ── Header Component ──────────────────────────
    function Header() {
      return (
        <header>
          <div className="header-left">
            <img src="assets/images/logo.jpg" className="logo-image" alt="DRDO Logo"
                 onError={e => e.target.style.display = 'none'} />
            <div className="org-name">
              <h3>Gas Turbine Research Establishment</h3>
              <span>Ministry of Defence, Government of India</span>
            </div>
          </div>
          <div className="header-mid">
            <h1>DEVICE STATUS MONITORING</h1>
            <div className="nav-btns">
              <button>Home</button>
              <button>Help</button>
              <button>Contact</button>
            </div>
          </div>
          <div className="header-right">
            <button className="logout-btn">Logout</button>
          </div>
        </header>
      );
    }

    // ── Sidebar Component ─────────────────────────
    function Sidebar({ onNavigate }) {
      const [open, setOpen] = React.useState(false);
      return (
        <div className="sidebar">
          <h6>MENU</h6>
          <div>
            <div className="dropdown-label" onClick={() => setOpen(!open)}>
              Forms {open ? '▲' : '▼'}
            </div>
            <div className="dropdown-items" style={{ maxHeight: open ? '200px' : '0' }}>
              <div className="dropdown-item" onClick={onNavigate}>device status</div>
            </div>
          </div>
        </div>
      );
    }

    // ── Single Device Row ─────────────────────────
    function DeviceRow({ ip }) {
      return (
        <div className="ip-item">
          <span className="status-dot" style={{ background: getColor(ip.status) }}></span>
          <span className="addr">{ip.address}</span>
          <span className="status-text" style={{ color: getColor(ip.status) }}>
            {getText(ip.status)}
          </span>
          {ip.responseTime && ip.status === 'UP' && (
            <span className="response-time">{ip.responseTime}ms</span>
          )}
          {ip.lastChecked && (
            <span className="last-checked">Last checked: {formatDate(ip.lastChecked)}</span>
          )}
        </div>
      );
    }

    // ── Device Dashboard ──────────────────────────
    function Dashboard() {
      const [devices, setDevices]     = React.useState([]);
      const [loading, setLoading]     = React.useState(true);
      const [error, setError]         = React.useState(null);
      const [lastUpdated, setLastUpdated] = React.useState('');

      function fetchDevices() {
        fetch(API_URL)
          .then(res => {
            if (!res.ok) throw new Error('Server error: ' + res.status);
            return res.json();
          })
          .then(data => {
            setDevices(data);
            setLoading(false);
            setError(null);
            setLastUpdated(new Date().toLocaleTimeString());
          })
          .catch(err => {
            setError(err.message);
            setLoading(false);
          });
      }

      React.useEffect(() => {
        fetchDevices();
        const interval = setInterval(fetchDevices, 10000);
        return () => clearInterval(interval); // cleanup on unmount
      }, []);

      const online  = devices.filter(d => d.status === 'UP').length;
      const offline = devices.filter(d => d.status === 'DOWN').length;
      const errCount = devices.filter(d => d.status === 'ERROR').length;

      return (
        <div className="container">
          <h1>IP Address Monitor</h1>

          {/* Legend */}
          <div className="legend">
            <span><span className="legend-dot" style={{background:'green'}}></span>Online</span>
            <span><span className="legend-dot" style={{background:'red'}}></span>Offline</span>
            <span><span className="legend-dot" style={{background:'orange'}}></span>Error</span>
          </div>

          {/* Status bar */}
          {!loading && !error && (
            <div className="status-bar">
              <span>{devices.length} devices — {online} online, {offline} offline, {errCount} error</span>
              <span style={{fontStyle:'italic'}}>Last updated: {lastUpdated}</span>
            </div>
          )}

          {/* States */}
          {loading && <div className="loading">Loading devices...</div>}

          {error && (
            <div className="error-msg">
              ⚠️ Could not connect to backend.<br/>
              Make sure Spring Boot is running at <strong>localhost:8080</strong><br/>
              <small>{error}</small>
            </div>
          )}

          {/* Device list */}
          {!loading && !error && (
            <div className="ip-list">
              {devices.map(ip => <DeviceRow key={ip.id} ip={ip} />)}
            </div>
          )}
        </div>
      );
    }

    // ── Root App ──────────────────────────────────
    function App() {
      return (
        <>
          <Header />
          <Sidebar onNavigate={() => {}} />
          <div id="content">
            <Dashboard />
          </div>
          <footer>@2026 Defence Research &amp; Development Organization</footer>
        </>
      );
    }

    // ── Mount ─────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>
</html>
